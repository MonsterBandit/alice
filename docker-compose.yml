services:
  alice-heart:
    container_name: alice
    build:
      context: .
      dockerfile: heart/Dockerfile
    ports:
      - "8000:8000"
    restart: always
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - ALICE_JWT_SECRET=${ALICE_JWT_SECRET}
      - ALICE_ADMIN_PASSWORD=${ALICE_ADMIN_PASSWORD}
      - FIREFLY_URL=${FIREFLY_URL}
      - FIREFLY_TOKEN=${FIREFLY_TOKEN}
    volumes:
      - /opt/alice:/opt/alice:ro
      - /:/host:ro

    depends_on:
      - alice-mariadb
      - alice-redis
      - alice-qdrant
    networks:
      - alice_default
      - compose_default

  alice-body:
    container_name: alice-body
    build:
      context: ./body
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    restart: always
    networks:
      - alice_default
      - compose_default

  alice-mariadb:
    container_name: alice-mariadb
    image: mariadb:11
    restart: always
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_DATABASE=${MARIADB_DATABASE}
    volumes:
      - alice-mariadb-data:/var/lib/mysql
    networks:
      - alice_default

  alice-redis:
    container_name: alice-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - alice-redis-data:/data
    networks:
      - alice_default

  alice-qdrant:
    container_name: alice-qdrant
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    restart: always
    volumes:
      - alice-qdrant-storage:/qdrant/storage
    networks:
      - alice_default

volumes:
  alice-mariadb-data:
  alice-redis-data:
  alice-qdrant-storage:

networks:
  alice_default:
    driver: bridge
  compose_default:
    external: true
